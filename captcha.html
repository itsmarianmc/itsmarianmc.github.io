<script src="https://www.google.com/recaptcha/enterprise.js?render=6LeXL4gsAAAAAGIrW5eB5zdLiOHOamAN8QaG7Fqw"></script>

<script>
function onClick(e) {
  e.preventDefault();
  grecaptcha.enterprise.ready(async () => {
    // 2. Token generieren für die Aktion 'login' oder 'submit'
    const token = await grecaptcha.enterprise.execute('6LeXL4gsAAAAAGIrW5eB5zdLiOHOamAN8QaG7Fqw', {action: 'submit'});
    
    // 3. Token an Vercel senden
    const response = await fetch('https://deine-api.vercel.app/api/verify', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ token: token })
    });
    
    const result = await response.json();
    console.log("Ergebnis vom Server:", result);
  });
}
</script>

<button onclick="onClick(event)">Formular absenden</button>
